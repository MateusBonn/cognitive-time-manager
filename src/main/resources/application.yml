spring:
  application:
    name: cognitive-time-manager

  datasource:
    url: jdbc:h2:mem:cognitivedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

cognitive:
  rabbitmq:
    exchange: cognitive.exchange
    queue:
      calendar-events: cognitive.calendar.events
      dead-letter: cognitive.dead-letter
    routing-key:
      calendar: calendar.event.#
  engine:
    workday-start: "09:00"
    workday-end: "18:00"

server:
  port: 8080

logging:
  level:
    com.cognitivemanager: DEBUG
    org.springframework.amqp: INFO
    org.springframework.web.socket: INFO
